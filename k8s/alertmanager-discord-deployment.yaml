apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-discord
  namespace: transitwatch
  labels:
    app: alertmanager-discord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-discord
  template:
    metadata:
      labels:
        app: alertmanager-discord
    spec:
      containers:
        - name: alertmanager-discord
          image: benjojo/alertmanager-discord:latest
          env:
            - name: DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: transitwatch-secrets
                  key: DISCORD_WEBHOOK_URL
          ports:
            - containerPort: 9094
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-discord
  namespace: transitwatch
  labels:
    app: alertmanager-discord
spec:
  selector:
    app: alertmanager-discord
  ports:
    - port: 9094
      targetPort: 9094
  type: ClusterIP
