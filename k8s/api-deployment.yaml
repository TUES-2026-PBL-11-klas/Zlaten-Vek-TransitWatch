apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: transitwatch
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: api
          image: ghcr.io/tues-2026-pbl-11-klas/transitwatch-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transitwatch-secrets
                  key: DATABASE_URL
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transitwatch-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: transitwatch-secrets
                  key: SUPABASE_JWT_SECRET
            - name: PORT
              value: "3000"
            - name: CORS_ORIGIN
              value: "http://localhost"
