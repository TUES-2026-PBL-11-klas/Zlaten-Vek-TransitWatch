apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: transitwatch
  labels:
    app: alertmanager
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: discord
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: discord
          continue: true

    receivers:
      - name: discord
        webhook_configs:
          - url: 'http://alertmanager-discord:9094'
            send_resolved: true

    templates: []
