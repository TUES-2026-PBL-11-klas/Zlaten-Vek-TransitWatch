apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: transitwatch
  labels:
    app: prometheus
data:
  transitwatch-rules.yml: |
    groups:
      - name: transitwatch-api
        rules:
          - alert: HighApiErrorRate
            expr: |
              (
                sum(rate(http_requests_total{status_code=~"5.."}[5m]))
                /
                sum(rate(http_requests_total[5m]))
              ) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "API 5xx error rate > 5%"
              description: "API error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

          - alert: HighGtfsRealtimePollErrors
            expr: rate(gtfs_realtime_poll_errors_total[5m]) > 0.1
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "GTFS realtime poll errors elevated"
              description: "GTFS realtime polling is experiencing {{ $value | humanize }} errors/sec over the last 5 minutes."
