apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: transitwatch
spec:
  stripPrefix:
    prefixes:
      - /api

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: transitwatch-api
  namespace: transitwatch
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: PathPrefix(`/api`)
      kind: Rule
      services:
        - name: api
          port: 3000
      middlewares:
        - name: strip-api-prefix

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: transitwatch-web
  namespace: transitwatch
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: web
          port: 80
