name: CD

on:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write
      packages: write

    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set image variables
      run: |
        OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
        SHORT_SHA="${IMAGE_TAG::7}"
        echo "API_IMAGE=ghcr.io/${OWNER}/transitwatch-api:${SHORT_SHA}" >> $GITHUB_ENV
        echo "WEB_IMAGE=ghcr.io/${OWNER}/transitwatch-web:${SHORT_SHA}" >> $GITHUB_ENV
        echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/setup-buildx-action@v3

    - name: Build and push API image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: apps/api/Dockerfile
        push: true
        tags: ${{ env.API_IMAGE }}

    - name: Build and push Web image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: apps/web/Dockerfile
        push: true
        tags: ${{ env.WEB_IMAGE }}
        build-args: |
          VITE_API_URL=${{ vars.VITE_API_URL }}
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: Update image tags in manifests
      run: |
        OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
        sed -i "s|image: ghcr.io/${OWNER}/transitwatch-api:.*|image: ${{ env.API_IMAGE }}|" k8s/api-deployment.yaml
        sed -i "s|image: ghcr.io/${OWNER}/transitwatch-web:.*|image: ${{ env.WEB_IMAGE }}|" k8s/web-deployment.yaml

    - name: Commit updated manifests
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/api-deployment.yaml k8s/web-deployment.yaml
        git diff --cached --quiet || git commit -m "ci: update images to ${{ env.SHORT_SHA }} [skip ci]"
        git push origin main

    - name: Notify Discord (success)
      if: success()
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        REPO: ${{ github.repository }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        SHA: ${{ github.event.workflow_run.head_sha }}
        ACTOR: ${{ github.event.workflow_run.actor.login }}
      run: |
        SHORT_SHA="${SHA::7}"
        curl -s -X POST "$DISCORD_WEBHOOK" \
          -H "Content-Type: application/json" \
          --data-binary @- << EOF
        {
          "embeds": [{
            "title": "Images built — ArgoCD syncing ${REPO}",
            "url": "${RUN_URL}",
            "description": "New images pushed to GHCR. ArgoCD will roll out the update automatically.",
            "color": 5763719,
            "fields": [
              {"name": "Commit",       "value": "[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${REPO}/commit/${SHA})", "inline": true},
              {"name": "Deployed by",  "value": "${ACTOR}",                                                       "inline": true},
              {"name": "API image",    "value": "\`${{ env.API_IMAGE }}\`",                                       "inline": false},
              {"name": "Web image",    "value": "\`${{ env.WEB_IMAGE }}\`",                                       "inline": false}
            ],
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "footer": {"text": "TransitWatch CD"}
          }]
        }
        EOF

    - name: Notify Discord (failure)
      if: failure()
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        REPO: ${{ github.repository }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        SHA: ${{ github.event.workflow_run.head_sha }}
        ACTOR: ${{ github.event.workflow_run.actor.login }}
      run: |
        SHORT_SHA="${SHA::7}"
        curl -s -X POST "$DISCORD_WEBHOOK" \
          -H "Content-Type: application/json" \
          --data-binary @- << EOF
        {
          "embeds": [{
            "title": "Deployment Failed — ${REPO}",
            "url": "${RUN_URL}",
            "description": "The production deployment did not complete. Check the logs for details.",
            "color": 15548997,
            "fields": [
              {"name": "Commit",      "value": "[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${REPO}/commit/${SHA})", "inline": true},
              {"name": "Triggered by","value": "${ACTOR}",                                                       "inline": true}
            ],
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "footer": {"text": "TransitWatch CD"}
          }]
        }
        EOF
