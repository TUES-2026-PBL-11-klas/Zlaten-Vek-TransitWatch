# CI

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secrets-scan:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:placeholder@localhost:5432/placeholder
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
    - run: npm ci
    - run: npx prisma generate
      working-directory: apps/api
    - run: npm run check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:placeholder@localhost:5432/placeholder
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
    - run: npm ci
    - run: npx prisma generate
      working-directory: apps/api
    - run: npm run test

  notify:
    name: Notify Discord (Failure)
    runs-on: ubuntu-latest
    needs: [ secrets-scan, lint, test ]
    if: always() && contains(needs.*.result, 'failure')
    steps:
    - name: Send failure notification
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        REPO: ${{ github.repository }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        ACTOR: ${{ github.actor }}
        BRANCH: ${{ github.ref_name }}
        SHA: ${{ github.sha }}
        RESULT_SECRETS: ${{ needs.secrets-scan.result }}
        RESULT_LINT: ${{ needs.lint.result }}
        RESULT_TEST: ${{ needs.test.result }}
      run: |
        SHORT_SHA="${SHA::7}"
        FAILED=""
        [[ "$RESULT_SECRETS" == "failure" ]] && FAILED="${FAILED}• Secrets Scan\\n"
        [[ "$RESULT_LINT"    == "failure" ]] && FAILED="${FAILED}• Lint\\n"
        [[ "$RESULT_TEST"    == "failure" ]] && FAILED="${FAILED}• Unit Tests\\n"

        curl -s -X POST "$DISCORD_WEBHOOK" \
          -H "Content-Type: application/json" \
          --data-binary @- << EOF
        {
          "embeds": [{
            "title": "CI Failed — ${REPO}",
            "url": "${RUN_URL}",
            "description": "**Failed jobs:**\n${FAILED}",
            "color": 15548997,
            "fields": [
              {"name": "Branch",        "value": "\`${BRANCH}\`",                                                           "inline": true},
              {"name": "Commit",        "value": "[\`${SHORT_SHA}\`](${GITHUB_SERVER_URL}/${REPO}/commit/${SHA})", "inline": true},
              {"name": "Triggered by",  "value": "${ACTOR}",                                                                "inline": true}
            ],
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "footer": {"text": "TransitWatch CI"}
          }]
        }
        EOF
